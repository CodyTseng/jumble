name: Deploy Jumble Container Image
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  push_avestruz_image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true # Crucial: Ensures git history includes tags

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Variables
        uses: actions/github-script@v7
        id: set_variables
        with:
          script: |
            let tag = '';

            // Check if triggered by a tag push
            if (context.eventName === 'push' && context.ref.startsWith('refs/tags/')) {
              tag = context.ref.replace('refs/tags/', '');
            } 
            // If manual dispatch, fetch the latest tag from git history
            else if (context.eventName === 'workflow_dispatch') {
              let output = '';
              const options = {
                listeners: {
                  stdout: (data) => { output += data.toString(); }
                }
              };
              // Get the most recent tag sorted by version
              await exec.exec('git', ['tag', '--sort=-version:refname', '|', 'head', '-n', '1'], {
                shell: '/bin/bash',
                listeners: {
                  stdout: (data) => { output += data.toString(); }
                }
              });
              tag = output.trim();
              
              if (!tag) {
                core.setFailed('No tags found in repository for workflow_dispatch');
                return;
              }
              console.log(`Found latest tag for dispatch: ${tag}`);
            } else {
              core.setFailed(`Unsupported event or ref: ${context.eventName} / ${context.ref}`);
              return;
            }

            // Process the tag (remove 'v', remove suffix after dash)
            const no_v = tag.replace('v', '');
            const dash_index = no_v.lastIndexOf('-');
            const no_dash = (dash_index > -1) ? no_v.substring(0, dash_index) : no_v;

            // Set outputs
            core.setOutput('tag', tag);
            core.setOutput('tag-no-v', no_v);
            core.setOutput('tag-no-dash', no_dash);

            // Lowercase for GHCR
            const actor = context.actor.toLowerCase();
            const repository = context.repo.repo.toLowerCase();
            core.setOutput('actor', actor);
            core.setOutput('repository', repository);

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.set_variables.outputs.actor }}/${{ steps.set_variables.outputs.repository }}:latest
            ghcr.io/${{ steps.set_variables.outputs.actor }}/${{ steps.set_variables.outputs.repository }}:${{ steps.set_variables.outputs.tag-no-dash }}

      - name: Release
        # Only create a release on tag push, not on manual dispatch
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
