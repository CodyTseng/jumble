name: Deploy Jumble Container Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Only build on tag with semantic versioning format
  workflow_dispatch:

jobs:
  push_avestruz_image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      # Script for setting the version without the leading 'v'
      - name: Set Variables
        uses: actions/github-script@v7
        id: set_variables
        with:
          script: |
            // Get the tag
            const tag = context.ref.substring(10)
            // Replace the tag with one without v
            const no_v = tag.replace('v', '')
            // Looks for a dash
            const dash_index = no_v.lastIndexOf('-')
            // If any, removes it, otherwise return the value unchanged
            const no_dash = (dash_index > -1) ?  no_v.substring(0, dash_index) : no_v
            // Set the tag, no-v and no-dash as output variables
            core.setOutput('tag', tag)
            core.setOutput('tag-no-v', no_v)
            core.setOutput('tag-no-dash', no_dash)
            // convert everything to lowercase because ghcr repository name must be lowercase
            const actor = context.actor.toLowerCase();
            const repository = context.repo.repo.toLowerCase();
            core.setOutput('actor', actor);
            core.setOutput('repository', repository);
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.set_variables.outputs.actor }}/${{ steps.set_variables.outputs.repository }}:latest
            ghcr.io/${{ steps.set_variables.outputs.username }}/${{ steps.set_variables.outputs.repository }}:${{steps.set_variables.outputs.tag-no-dash}}
      - name: Release
        uses: softprops/action-gh-release@v1
